<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ app_name|default("MarkItDown Web") }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-semibold text-lg text-slate-800 flex items-center gap-2">
        <span class="text-2xl">📄</span>
        <span>{{ app_name|default("MarkItDown Web") }}</span>
      </a>
      <nav class="flex items-center gap-4 text-sm">
        {% block nav %}
        {% if user %}
          <span class="text-slate-600">
            {{ user.display_name or user.username }}
            {% if user.role == "admin" %}
              <span class="ml-1 inline-block px-1.5 py-0.5 text-xs bg-amber-100 text-amber-800 rounded">admin</span>
            {% endif %}
          </span>
          <a href="/upload" class="text-indigo-600 hover:underline">Upload</a>
          <form method="post" action="/logout" class="inline">
            <button type="submit" class="text-slate-600 hover:underline">Logout</button>
          </form>
        {% endif %}
        {% endblock %}
      </nav>
    </div>
  </header>

  <main class="flex-1">
    <div class="max-w-6xl mx-auto px-4 py-8">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="border-t border-slate-200 bg-white">
    <div class="max-w-6xl mx-auto px-4 py-3 text-xs text-slate-500 flex items-center justify-between">
      <span>Powered by Microsoft MarkItDown</span>
      <span>{% block version %}{% endblock %}</span>
    </div>
  </footer>
</body>
</html>
