services:
  markitdown-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: markitdown-web:latest
    container_name: markitdown-web
    restart: unless-stopped
    # Run as root inside the container so the host-mounted ./data volume is
    # always writable. See Dockerfile note. Override here if you mount
    # data/ with explicit non-root ownership.
    user: "0:0"
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      # --- App ---
      APP_NAME: "${APP_NAME:-MarkItDown Web}"
      BASE_URL: "${BASE_URL:-http://localhost:8000}"
      SECRET_KEY: "${SECRET_KEY:-changeme-please-generate-a-real-one}"
      DEBUG: "${DEBUG:-false}"
      MAX_UPLOAD_SIZE: "${MAX_UPLOAD_SIZE:-104857600}"  # 100 MB
      DATA_RETENTION_SECONDS: "${DATA_RETENTION_SECONDS:-600}"   # 10 min sliding
      SLIDING_TTL: "${SLIDING_TTL:-true}"
      REAPER_INTERVAL_SECONDS: "${REAPER_INTERVAL_SECONDS:-60}"

      # --- Bootstrap admin (only used on first run) ---
      BOOTSTRAP_USER: "${BOOTSTRAP_USER:-admin}"
      BOOTSTRAP_PASSWORD: "${BOOTSTRAP_PASSWORD:-admin}"

      # --- Local auth ---
      LOCAL_AUTH_ENABLED: "${LOCAL_AUTH_ENABLED:-true}"

      # --- OIDC / Authentik ---
      OIDC_ENABLED: "${OIDC_ENABLED:-false}"
      OIDC_ISSUER: "${OIDC_ISSUER:-}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_SCOPES: "${OIDC_SCOPES:-openid profile email}"
      OIDC_AUTO_CREATE_USERS: "${OIDC_AUTO_CREATE_USERS:-true}"
    volumes:
      - ./data:/app/data
    # Run behind a reverse proxy in production. The defaults work for local dev.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
